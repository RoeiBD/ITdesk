<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITDESK — ניהול קריאות IT</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('mPfw0bhNqpsB-htEF');</script>
<style>
  :root {
    --bg: #060810;
    --surface: #0c0f1a;
    --surface2: #111520;
    --surface3: #161b28;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #e8eaf2;
    --text2: #8892aa;
    --text3: #4a5268;
    --accent: #4f7cff;
    --accent2: #6e9bff;
    --critical: #ff3d6b;
    --high: #ff8c3d;
    --normal: #2dd4a0;
    --hd-color: #a78bfa;
    --sys-color: #34d399;
    --status-open: #4f7cff;
    --status-prog: #f59e0b;
    --status-closed: #475569;
    --glow: 0 0 40px rgba(79,124,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,124,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.08) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 64px;
    background: rgba(12,15,26,0.9);
    border-bottom: 1px solid var(--border2);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #4f7cff, #6e3fff);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(79,124,255,0.4);
  }
  .logo-text {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
  }
  .logo-text span { color: var(--accent2); }
  .header-stats {
    display: flex;
    gap: 8px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
  }
  .stat-num {
    font-weight: 800;
    font-size: 18px;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-label { color: var(--text2); font-size: 11px; font-weight: 500; }
  .new-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #4f7cff, #6e3fff);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 9px 20px;
    font-weight: 700;
    font-size: 14px;
    font-family: 'Rubik', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(79,124,255,0.35);
    transition: all 0.2s;
  }
  .new-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(79,124,255,0.5); }
  .new-btn:active { transform: translateY(0); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Rubik', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    pointer-events: none;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-title {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 4px;
    padding: 0 4px;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: 6px 10px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Rubik', sans-serif;
    cursor: pointer;
    text-align: right;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: rgba(79,124,255,0.15);
    border-color: rgba(79,124,255,0.3);
    color: var(--accent2);
    font-weight: 600;
  }

  /* TICKET LIST */
  .ticket-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ticket-list::-webkit-scrollbar { width: 4px; }
  .ticket-list::-webkit-scrollbar-track { background: transparent; }
  .ticket-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .empty-state {
    text-align: center;
    color: var(--text3);
    margin-top: 60px;
    font-size: 14px;
  }

  .ticket-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ticket-card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }
  .ticket-card:hover { background: var(--surface2); border-color: var(--border2); transform: translateX(-2px); }
  .ticket-card.selected {
    background: var(--surface2);
    border-color: rgba(79,124,255,0.4);
    box-shadow: var(--glow);
  }
  .ticket-card.selected::before { background: var(--accent); }
  .ticket-card.pri-critical::before { background: var(--critical); }
  .ticket-card.pri-critical.selected { border-color: rgba(255,61,107,0.4); box-shadow: 0 0 30px rgba(255,61,107,0.15); }

  .tc-left { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 56px; }
  .tc-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); font-weight: 600; }
  .type-badge {
    font-size: 10px; font-weight: 800; padding: 2px 7px;
    border-radius: 4px; border: 1px solid; letter-spacing: 0.5px;
  }
  .type-hd { color: var(--hd-color); border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.08); }
  .type-sys { color: var(--sys-color); border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.08); }
  .tc-middle { flex: 1; min-width: 0; }
  .tc-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tc-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .tc-meta span { font-size: 11px; color: var(--text2); }
  .tc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .pri-badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
  }
  .pri-critical { background: rgba(255,61,107,0.15); color: var(--critical); }
  .pri-high { background: rgba(255,140,61,0.15); color: var(--high); }
  .pri-normal { background: rgba(45,212,160,0.15); color: var(--normal); }
  .status-badge {
    font-size: 11px; padding: 2px 9px; border-radius: 5px; font-weight: 500;
  }
  .st-open { background: rgba(79,124,255,0.12); color: var(--status-open); }
  .st-prog { background: rgba(245,158,11,0.12); color: var(--status-prog); }
  .st-closed { background: rgba(71,85,105,0.15); color: var(--status-closed); }

  /* DETAIL PANEL */
  .detail-panel {
    width: 340px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .detail-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .detail-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .detail-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .close-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 28px; height: 28px;
    border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .close-btn:hover { background: var(--surface2); color: var(--text); }
  .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 18px; }
  .detail-body::-webkit-scrollbar { width: 3px; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .section-title {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 700;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px; margin-bottom: 10px;
  }
  .info-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .info-icon { font-size: 13px; min-width: 20px; }
  .info-label { font-size: 11px; color: var(--text3); min-width: 60px; }
  .info-val { font-size: 13px; color: var(--text2); font-weight: 500; }
  .desc-box {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }
  .status-section { display: flex; flex-direction: column; gap: 8px; }
  .status-btns { display: flex; gap: 6px; }
  .st-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 8px 4px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Rubik', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .st-btn:hover { border-color: var(--border2); color: var(--text); }
  .st-btn.active-open { background: rgba(79,124,255,0.15); border-color: rgba(79,124,255,0.4); color: var(--status-open); }
  .st-btn.active-prog { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: var(--status-prog); }
  .st-btn.active-closed { background: rgba(71,85,105,0.15); border-color: rgba(71,85,105,0.4); color: var(--status-closed); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 28px;
    width: 580px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 60px rgba(79,124,255,0.1);
  }
  .modal-title {
    font-size: 20px; font-weight: 800; color: var(--text);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-title span { color: var(--accent2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span2 { grid-column: 1 / -1; }
  .form-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Rubik', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,0.12); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 9px;
    padding: 10px 20px;
    font-size: 14px; font-weight: 600; font-family: 'Rubik', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }
  .btn-submit {
    background: linear-gradient(135deg, #4f7cff, #6e3fff);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 10px 24px;
    font-size: 14px; font-weight: 700; font-family: 'Rubik', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79,124,255,0.3);
    transition: all 0.2s;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,124,255,0.45); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid rgba(45,212,160,0.4);
    color: var(--normal);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .del-btn {
    width: 100%;
    margin-top: 8px;
    background: rgba(255,61,107,0.08);
    border: 1px solid rgba(255,61,107,0.25);
    color: #ff3d6b;
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Rubik', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .del-btn:hover { background: rgba(255,61,107,0.18); }

  /* File attachment */
  .file-drop {
    display: block;
    background: var(--surface2);
    border: 2px dashed var(--border2);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .file-drop:hover { border-color: var(--accent); background: rgba(79,124,255,0.05); }
  .file-drop.dragover { border-color: var(--accent); background: rgba(79,124,255,0.1); }
  .file-drop-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
  .file-drop-text { font-size: 13px; color: var(--text2); font-weight: 500; }
  .file-drop-sub { font-size: 11px; color: var(--text3); }
  .file-preview-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 9px; padding: 10px 14px; margin-top: 8px;
  }
  .attachment-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.25);
    color: var(--accent2); border-radius: 6px; padding: 4px 10px;
    font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 8px;
    text-decoration: none; transition: background 0.15s;
  }
  .attachment-chip:hover { background: rgba(79,124,255,0.2); }

  /* scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚙</div>
    <div class="logo-text">IT<span>DESK</span></div>
  </div>
  <div class="header-stats" id="headerStats"></div>
  <button class="new-btn" onclick="openModal()">
    <span style="font-size:16px">＋</span> קריאה חדשה
  </button>
</header>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="חיפוש..." oninput="render()">
    </div>
    <div class="filter-group">
      <div class="filter-title">סטטוס</div>
      <button class="filter-btn active" onclick="setFilter('status','הכל',this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('status','פתוח',this)">פתוח</button>
      <button class="filter-btn" onclick="setFilter('status','בטיפול',this)">בטיפול</button>
      <button class="filter-btn" onclick="setFilter('status','נסגר',this)">נסגר</button>
    </div>
    <div class="filter-group">
      <div class="filter-title">סוג</div>
      <button class="filter-btn active" onclick="setFilter('type','הכל',this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('type','HD',this)">Help Desk</button>
      <button class="filter-btn" onclick="setFilter('type','סיסטם',this)">System</button>
    </div>
    <div class="filter-group">
      <div class="filter-title">עדיפות</div>
      <button class="filter-btn active" onclick="setFilter('priority','הכל',this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('priority','קריטי',this)">🔴 קריטי</button>
      <button class="filter-btn" onclick="setFilter('priority','גבוהה',this)">🟠 גבוהה</button>
      <button class="filter-btn" onclick="setFilter('priority','רגילה',this)">🟢 רגילה</button>
    </div>
  </div>

  <!-- TICKET LIST -->
  <div class="ticket-list" id="ticketList"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel" style="display:none"></div>
</div>

<!-- NEW TICKET MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">⚡ <span>קריאה חדשה</span></div>
    <div class="form-grid">
      <div class="form-group span2">
        <div class="form-label">כותרת התקלה</div>
        <input class="form-input" id="f-title" placeholder="תיאור קצר של הבעיה" oninput="checkForm()">
      </div>
      <div class="form-group">
        <div class="form-label">שם מלא</div>
        <input class="form-input" id="f-name" placeholder="ישראל ישראלי" oninput="checkForm()">
      </div>
      <div class="form-group">
        <div class="form-label">טלפון</div>
        <input class="form-input" id="f-phone" placeholder="05X-XXXXXXX">
      </div>
      <div class="form-group">
        <div class="form-label">אימייל</div>
        <input class="form-input" id="f-email" placeholder="name@company.co.il" type="email">
      </div>
      <div class="form-group">
        <div class="form-label">מחלקה</div>
        <input class="form-input" id="f-dept" placeholder="כספים / פיתוח...">
      </div>
      <div class="form-group">
        <div class="form-label">סוג קריאה</div>
        <select class="form-input" id="f-type">
          <option value="HD">HD — Help Desk</option>
          <option value="סיסטם">סיסטם — System</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">עדיפות</div>
        <select class="form-input" id="f-priority">
          <option value="רגילה">🟢 רגילה</option>
          <option value="גבוהה">🟠 גבוהה</option>
          <option value="קריטי">🔴 קריטי</option>
        </select>
      </div>
      <div class="form-group span2">
        <div class="form-label">תיאור הבעיה</div>
        <textarea class="form-input" id="f-desc" placeholder="פרט את הבעיה בצורה מלאה..."></textarea>
      </div>
      <div class="form-group span2">
        <div class="form-label">קובץ מצורף (אופציונלי)</div>
        <label class="file-drop" id="fileDrop">
          <input type="file" id="f-file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.log,.zip" onchange="handleFile(this)" style="display:none">
          <div class="file-drop-inner" id="fileDropInner">
            <span style="font-size:28px">📎</span>
            <span class="file-drop-text">לחץ לבחירת קובץ או גרור לכאן</span>
            <span class="file-drop-sub">תמונות, PDF, Word, Excel, ZIP — עד 5MB</span>
          </div>
        </label>
        <div id="filePreview" style="display:none" class="file-preview-box">
          <span id="filePreviewIcon" style="font-size:22px">📄</span>
          <span id="filePreviewName" style="font-size:13px;color:var(--text2);flex:1"></span>
          <span id="filePreviewSize" style="font-size:11px;color:var(--text3)"></span>
          <button onclick="clearFile()" style="background:transparent;border:none;color:var(--critical);cursor:pointer;font-size:16px">✕</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-submit" id="submitBtn" onclick="createTicket()" disabled>פתח קריאה</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// File attachment handling
let currentFile = null;
let currentFileData = null;

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('⚠️ הקובץ גדול מ-5MB'); return; }
  currentFile = file;
  const icons = { 'image': '🖼️', 'pdf': '📕', 'word': '📘', 'excel': '📗', 'zip': '🗜️', 'text': '📄' };
  const ext = file.name.split('.').pop().toLowerCase();
  const iconMap = { png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', webp:'🖼️', pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', zip:'🗜️', txt:'📄', log:'📄' };
  const icon = iconMap[ext] || '📎';
  const size = file.size < 1024*1024 ? `${(file.size/1024).toFixed(1)} KB` : `${(file.size/1024/1024).toFixed(1)} MB`;
  document.getElementById('fileDropInner').style.display = 'none';
  const preview = document.getElementById('filePreview');
  preview.style.display = 'flex';
  document.getElementById('filePreviewIcon').textContent = icon;
  document.getElementById('filePreviewName').textContent = file.name;
  document.getElementById('filePreviewSize').textContent = size;

  // Read as base64 for storage
  const reader = new FileReader();
  reader.onload = e => { currentFileData = { name: file.name, data: e.target.result, size, icon, ext }; };
  reader.readAsDataURL(file);
}

function clearFile() {
  currentFile = null; currentFileData = null;
  document.getElementById('f-file').value = '';
  document.getElementById('fileDropInner').style.display = 'flex';
  document.getElementById('filePreview').style.display = 'none';
}

// Drag and drop
document.addEventListener('DOMContentLoaded', () => {
  const drop = document.getElementById('fileDrop');
  if (!drop) return;
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) { const input = document.getElementById('f-file'); const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files; handleFile(input); }
  });
  drop.addEventListener('click', () => document.getElementById('f-file').click());
});

function loadTickets() {
  try { const s = localStorage.getItem('itdesk_tickets'); return s ? JSON.parse(s) : []; }
  catch(e) { return []; }
}
function saveTickets() {
  try { localStorage.setItem('itdesk_tickets', JSON.stringify(tickets)); } catch(e) {}
}
function getNextNum() {
  try { return parseInt(localStorage.getItem('itdesk_next') || '1'); } catch(e) { return 1; }
}
function saveNextNum(n) {
  try { localStorage.setItem('itdesk_next', String(n)); } catch(e) {}
}

let tickets = loadTickets();
let filters = { status:'הכל', type:'הכל', priority:'הכל' };
let selectedId = null;
let nextNum = getNextNum();

function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return tickets.filter(t => {
    if (filters.status !== 'הכל' && t.status !== filters.status) return false;
    if (filters.type !== 'הכל' && t.type !== filters.type) return false;
    if (filters.priority !== 'הכל' && t.priority !== filters.priority) return false;
    if (q && !t.title.includes(q) && !t.name.includes(q) && !t.id.toLowerCase().includes(q)) return false;
    return true;
  });
}

function priClass(p) { return p==='קריטי'?'pri-critical':p==='גבוהה'?'pri-high':'pri-normal'; }
function stClass(s) { return s==='פתוח'?'st-open':s==='בטיפול'?'st-prog':'st-closed'; }
function priIcon(p) { return p==='קריטי'?'🔴':p==='גבוהה'?'🟠':'🟢'; }

function render() {
  const list = filtered();
  const el = document.getElementById('ticketList');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state">אין קריאות עדיין — פתח קריאה חדשה ✚</div>';
  } else {
    el.innerHTML = list.map(t => `
      <div class="ticket-card pri-${t.priority==='קריטי'?'critical':t.priority==='גבוהה'?'high':'normal'} ${selectedId===t.id?'selected':''}" onclick="selectTicket('${t.id}')">
        <div class="tc-left">
          <div class="type-badge type-${t.type==='HD'?'hd':'sys'}">${t.type}</div>
          <div class="tc-id">${t.id}</div>
        </div>
        <div class="tc-middle">
          <div class="tc-title">${t.title}</div>
          <div class="tc-meta">
            <span>👤 ${t.name}</span>
            <span>🏢 ${t.dept}</span>
            <span>🕒 ${t.created}</span>
          </div>
        </div>
        <div class="tc-right">
          <div class="pri-badge ${priClass(t.priority)}">${priIcon(t.priority)} ${t.priority}</div>
          <div class="status-badge ${stClass(t.status)}">${t.status}</div>
        </div>
      </div>
    `).join('');
  }

  renderStats();
  if (selectedId) {
    const t = tickets.find(x => x.id === selectedId);
    if (t) renderDetail(t); else closeDetail();
  }
}

function renderStats() {
  const open = tickets.filter(t=>t.status==='פתוח').length;
  const prog = tickets.filter(t=>t.status==='בטיפול').length;
  const crit = tickets.filter(t=>t.priority==='קריטי').length;
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill"><div class="stat-num" style="color:#e8eaf2">${tickets.length}</div><div class="stat-label">סה״כ</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--status-open)">${open}</div><div class="stat-label">פתוחות</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--status-prog)">${prog}</div><div class="stat-label">בטיפול</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--critical)">${crit}</div><div class="stat-label">קריטיות</div></div>
  `;
}

function selectTicket(id) {
  selectedId = id;
  const t = tickets.find(x=>x.id===id);
  const panel = document.getElementById('detailPanel');
  panel.style.display = 'flex';
  panel.style.flexDirection = 'column';
  renderDetail(t);
  render();
}

function renderDetail(t) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-top">
        <div>
          <div class="detail-id">${t.id}</div>
          <div class="detail-title">${t.title}</div>
        </div>
        <button class="close-btn" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-badges">
        <div class="type-badge type-${t.type==='HD'?'hd':'sys'}">${t.type}</div>
        <div class="pri-badge ${priClass(t.priority)}">${priIcon(t.priority)} ${t.priority}</div>
        <div class="status-badge ${stClass(t.status)}">${t.status}</div>
      </div>
    </div>
    <div class="detail-body">
      <div>
        <div class="section-title">פרטי מגיש</div>
        <div class="info-row"><span class="info-icon">👤</span><span class="info-label">שם</span><span class="info-val">${t.name}</span></div>
        <div class="info-row"><span class="info-icon">📞</span><span class="info-label">טלפון</span><span class="info-val">${t.phone}</span></div>
        <div class="info-row"><span class="info-icon">✉️</span><span class="info-label">אימייל</span><span class="info-val">${t.email}</span></div>
        <div class="info-row"><span class="info-icon">🏢</span><span class="info-label">מחלקה</span><span class="info-val">${t.dept}</span></div>
      </div>
      <div>
        <div class="section-title">פרטי תקלה</div>
        <div class="info-row"><span class="info-icon">🕒</span><span class="info-label">נפתחה</span><span class="info-val">${t.created}</span></div>
        <div class="info-row"><span class="info-icon">🔧</span><span class="info-label">מטפל</span><span class="info-val">${t.assignee}</span></div>
        <div class="desc-box" style="margin-top:10px">${t.desc}</div>
        ${t.attachment ? `<a class="attachment-chip" href="${t.attachment.data}" download="${t.attachment.name}" target="_blank">
          ${t.attachment.icon} ${t.attachment.name} <span style="color:var(--text3);font-size:10px">${t.attachment.size}</span>
        </a>` : ''}
      </div>
      <div class="status-section">
        <div class="section-title">עדכון סטטוס</div>
        <div class="status-btns">
          <button class="st-btn ${t.status==='פתוח'?'active-open':''}" onclick="updateStatus('${t.id}','פתוח')">פתוח</button>
          <button class="st-btn ${t.status==='בטיפול'?'active-prog':''}" onclick="updateStatus('${t.id}','בטיפול')">בטיפול</button>
          <button class="st-btn ${t.status==='נסגר'?'active-closed':''}" onclick="updateStatus('${t.id}','נסגר')">נסגר</button>
        </div>
        <button class="del-btn" onclick="deleteTicket('${t.id}')">🗑️ מחק קריאה</button>
      </div>
    </div>
  `;
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detailPanel').style.display = 'none';
  render();
}

function updateStatus(id, status) {
  tickets = tickets.map(t => t.id===id ? {...t, status} : t);
  saveTickets();
  const t = tickets.find(x=>x.id===id);
  renderDetail(t);
  render();
  showToast(`✅ סטטוס עודכן ל"${status}"`);
}

function setFilter(key, val, btn) {
  filters[key] = val;
  btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal(e) {
  if (!e || e.target===document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

function checkForm() {
  const ok = document.getElementById('f-title').value.trim() && document.getElementById('f-name').value.trim();
  document.getElementById('submitBtn').disabled = !ok;
}

function createTicket() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const created = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const num = nextNum++;
  saveNextNum(nextNum);
  const id = `TK-${String(num).padStart(4,'0')}`;
  const t = {
    id, created, assignee:'—', status:'פתוח',
    title: document.getElementById('f-title').value.trim(),
    name: document.getElementById('f-name').value.trim(),
    phone: document.getElementById('f-phone').value.trim() || '—',
    email: document.getElementById('f-email').value.trim() || '—',
    dept: document.getElementById('f-dept').value.trim() || '—',
    type: document.getElementById('f-type').value,
    priority: document.getElementById('f-priority').value,
    desc: document.getElementById('f-desc').value.trim() || 'אין תיאור.',
    attachment: currentFileData || null,
  };
  tickets.unshift(t);
  saveTickets();

  // שליחת מייל אוטומטי
  emailjs.send('service_757m6pp', 'template_lnuhhi8', {
    ticket_id: t.id,
    title: t.title,
    name: t.name,
    phone: t.phone,
    email: t.email,
    dept: t.dept,
    type: t.type,
    priority: t.priority,
    desc: t.desc,
    created: t.created,
  }).then(() => {
    showToast('📧 מייל נשלח בהצלחה!');
  }).catch(() => {
    showToast('⚠️ קריאה נפתחה אך המייל לא נשלח');
  });

  ['f-title','f-name','f-phone','f-email','f-dept','f-desc'].forEach(id => document.getElementById(id).value='');
  clearFile();
  document.getElementById('f-type').value='HD';
  document.getElementById('f-priority').value='רגילה';
  document.getElementById('submitBtn').disabled = true;
  closeModal();
  render();
  setTimeout(()=>selectTicket(t.id), 50);
  showToast(`✅ קריאה ${id} נפתחה בהצלחה`);
}

function deleteTicket(id) {
  if (!confirm('למחוק את הקריאה לצמיתות?')) return;
  tickets = tickets.filter(t => t.id !== id);
  saveTickets();
  closeDetail();
  render();
  showToast('🗑️ קריאה נמחקה');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

render();
</script>
</body>
</html>
